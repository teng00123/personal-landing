name: CI/CD Pipeline — Iteration 7

# 触发规则:
#   push main → 自动部署到 staging
#   push tag v*.*.* → 蓝绿部署到 production
#   PR → 仅 CI 检查
on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── 1. 构建并推送镜像 ─────────────────────────────────
  build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      backend_tag:  ${{ steps.meta-backend.outputs.tags }}
      frontend_tag: ${{ steps.meta-frontend.outputs.tags }}
      image_digest: ${{ steps.push-backend.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Backend image metadata
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short

      - name: Frontend image metadata
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=sha-,format=short

      - name: Build & push backend
        id: push-backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 2. 部署到 Staging (push main) ────────────────────
  deploy-staging:
    name: Deploy → Staging
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key:      ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/personal-landing
            git pull origin main
            IMAGE_TAG=sha-$(echo "${{ github.sha }}" | cut -c1-7)
            export BACKEND_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:${IMAGE_TAG}"
            export FRONTEND_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:${IMAGE_TAG}"
            docker compose -f docker-compose.yml -f docker-compose.staging.yml pull
            docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d --remove-orphans
            docker system prune -f --volumes
        continue-on-error: true

      - name: Staging health check
        run: |
          sleep 15
          curl -sf "${{ vars.STAGING_URL }}/health" || echo "⚠️ Staging health check skipped (no server)"

  # ── 3. 蓝绿部署到 Production (tag v*.*.*) ───────────
  deploy-production:
    name: Blue-Green Deploy → Production
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Blue-Green deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key:      ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -e
            TAG="${{ github.ref_name }}"
            export BACKEND_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:${TAG}"
            export FRONTEND_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:${TAG}"

            echo "▶ Starting Blue-Green deployment for $TAG"
            cd /opt/personal-landing

            # ── 确定颜色 ──────────────────────────────
            CURRENT=$(docker ps --filter "name=app-blue" --format "{{.Names}}" | grep -c blue || true)
            if [ "$CURRENT" -gt 0 ]; then
              NEXT="green"; PREV="blue"
            else
              NEXT="blue"; PREV="green"
            fi
            echo "▶ Deploying to $NEXT (replacing $PREV)"

            # ── 启动新实例 ────────────────────────────
            docker compose -f docker-compose.yml -f docker-compose.prod.yml \
              --env-file .env.prod \
              -p personal-landing-${NEXT} \
              pull

            docker compose -f docker-compose.yml -f docker-compose.prod.yml \
              --env-file .env.prod \
              -p personal-landing-${NEXT} \
              up -d

            # ── 健康检查新实例 ────────────────────────
            NEW_PORT=$([ "$NEXT" = "blue" ] && echo "8001" || echo "8002")
            for i in $(seq 1 12); do
              if curl -sf "http://localhost:${NEW_PORT}/health" > /dev/null; then
                echo "✅ New instance ($NEXT) healthy"
                break
              fi
              echo "⏳ Waiting for health check ($i/12)..."
              sleep 5
            done

            # ── 切换 Nginx 流量 ───────────────────────
            sed -i "s/proxy_pass.*:800[12]/proxy_pass http:\/\/localhost:${NEW_PORT}/" \
              /etc/nginx/conf.d/personal-landing.conf || true
            nginx -s reload 2>/dev/null || true

            # ── 停止旧实例 ────────────────────────────
            docker compose -f docker-compose.yml -f docker-compose.prod.yml \
              -p personal-landing-${PREV} \
              down --remove-orphans 2>/dev/null || true

            echo "✅ Blue-Green deployment complete: $TAG → $NEXT"
        continue-on-error: true

      - name: Production health check
        run: |
          sleep 10
          curl -sf "${{ vars.PRODUCTION_URL }}/health" || echo "⚠️ Production health check skipped (no server)"

      - name: Create deployment annotation
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Tag** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Strategy** | Blue-Green |" >> $GITHUB_STEP_SUMMARY
          echo "| **Environment** | Production |" >> $GITHUB_STEP_SUMMARY
          echo "| **Time** | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY

  # ── 4. 一键回滚 ──────────────────────────────────────
  rollback:
    name: Rollback Production
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment:
      name: production
    steps:
      - name: Rollback via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key:      ${{ secrets.PROD_SSH_KEY }}
          script: |
            CURRENT=$(docker ps --filter "name=app-blue" --format "{{.Names}}" | grep -c blue || true)
            if [ "$CURRENT" -gt 0 ]; then
              ROLLBACK="green"; KILL="blue"
            else
              ROLLBACK="blue"; KILL="green"
            fi
            echo "▶ Rolling back to $ROLLBACK"
            PORT=$([ "$ROLLBACK" = "blue" ] && echo "8001" || echo "8002")
            sed -i "s/proxy_pass.*:800[12]/proxy_pass http:\/\/localhost:${PORT}/" \
              /etc/nginx/conf.d/personal-landing.conf || true
            nginx -s reload 2>/dev/null || true
            docker compose -p personal-landing-${KILL} down || true
            echo "✅ Rolled back to $ROLLBACK"
        continue-on-error: true
