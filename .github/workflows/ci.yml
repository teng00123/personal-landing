name: CI Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # 后端测试和基础检查
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, '[skip ci]') == false
    # 测试使用 SQLite in-memory + NullCacheManager，无需 MySQL/Redis 服务
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      
      - name: Install deps
        run: |
          cd backend
          pip install -r requirements.txt
          pip install ruff==0.4.4 pytest==8.2.0
      
      - name: Lint
        run: |
          cd backend
          ruff check app/ --output-format=github
          ruff format app/ --check
      
      - name: Test — import smoke
        run: |
          cd backend
          python -c "from app.main import app; print('✅ Import OK')"
        env:
          SECRET_KEY: test-secret-key-for-ci-only
          DB_HOST: localhost
          DB_PORT: 3306
          DB_USER: app
          DB_PASSWORD: apppass
          DB_NAME: test_db
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Test — happy path (Auth / Articles / Projects)
        run: |
          cd backend
          python -m pytest tests/test_auth.py tests/test_articles.py tests/test_projects.py \
            -v --tb=short --no-header \
            --junitxml=test-results.xml
        env:
          SECRET_KEY: test-secret-key-for-ci-only
          # DB/Redis 不会被实际连接（测试走 SQLite + NullCacheManager）
          DB_HOST: localhost
          DB_PORT: 3306
          DB_USER: app
          DB_PASSWORD: apppass
          DB_NAME: test_db
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: backend/test-results.xml

  # 前端构建检查
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, '[skip ci]') == false
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install & Build
        run: |
          cd frontend
          npm ci
          npm run build
          test -f dist/index.html
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  # 代码质量检查
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      
      - name: Commit lint
        run: |
          npm install -g @commitlint/cli@19 @commitlint/config-conventional@19
          echo "module.exports = {extends: ['@commitlint/config-conventional']}" > commitlint.config.js
          npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

  # Docker构建验证
  docker:
    name: Docker Build Test
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, '[skip ci]') == false
    
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: |
          docker build -t test-backend ./backend
          docker run --rm test-backend python -c "import fastapi; print('✅ OK')"
      - name: Validate compose
        run: docker compose config --quiet