name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 后端：Lint + 单元测试 ──────────────────────────────
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install deps
        run: |
          cd backend
          pip install -r requirements.txt
          pip install "ruff==0.4.4" "pytest==8.2.0"

      - name: Lint (ruff)
        run: |
          cd backend
          ruff check app/ --output-format=github
          ruff format app/ --check

      - name: Test
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short --no-header --junitxml=test-results.xml
        env:
          SECRET_KEY: ci-secret-key
          DB_HOST: localhost
          DB_PORT: 3306
          DB_USER: app
          DB_PASSWORD: apppass
          DB_NAME: test_db
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: backend/test-results.xml

  # ── 前端：构建检查 ────────────────────────────────────
  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install & build
        run: |
          cd frontend
          npm install
          npm run build
          test -f dist/index.html && echo "✅ dist/index.html exists"
        env:
          CI: "true"

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  # ── PR 专属：commit message 规范检查 ─────────────────
  commitlint:
    name: Commit lint (PR only)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check commit messages
        run: |
          npm install -g @commitlint/cli@19 @commitlint/config-conventional@19
          echo "module.exports = {extends: ['@commitlint/config-conventional']}" > commitlint.config.js
          npx commitlint \
            --from ${{ github.event.pull_request.base.sha }} \
            --to   ${{ github.event.pull_request.head.sha }} \
            --verbose
