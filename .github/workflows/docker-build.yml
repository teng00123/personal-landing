name: Docker Build Check

on:
  push:
    branches: [main, "feat/**", "fix/**"]
    paths:
      - "backend/Dockerfile"
      - "backend/requirements.txt"
      - "docker-compose.yml"
      - ".github/workflows/docker-build.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/Dockerfile"
      - "backend/requirements.txt"
      - "docker-compose.yml"

jobs:
  build-backend:
    name: Build Backend Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: personal-landing-backend:ci

      - name: Verify image
        run: |
          docker run --rm personal-landing-backend:ci \
            python -c "import fastapi, sqlalchemy, celery; print('✅ All packages importable')"

  compose-validate:
    name: Docker Compose Config Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose.yml syntax
        run: docker compose config --quiet && echo "✅ docker-compose.yml is valid"
