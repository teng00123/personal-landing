name: Frontend CI

on:
  push:
    branches: ["**"]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"

jobs:
  lint-build:
    name: Lint · Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci --prefer-offline 2>/dev/null || npm install

      # ── Lint ──────────────────────────────────────────────
      - name: ESLint (if configured)
        run: |
          if [ -f ".eslintrc*" ] || [ -f "eslint.config*" ]; then
            npx eslint src/ --max-warnings=20
          else
            echo "No ESLint config found — skipping"
          fi
        continue-on-error: true

      # ── Build ─────────────────────────────────────────────
      - name: Vite build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Check build output
        run: |
          echo "── Build artifacts ──"
          du -sh dist/
          ls -lh dist/assets/ | head -20
          # 确保关键文件存在
          test -f dist/index.html || (echo "❌ index.html missing" && exit 1)
          echo "✅ Build artifacts look good"

      # ── Upload build (供后续 job 使用) ────────────────────
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ github.sha }}
          path: frontend/dist/
          retention-days: 7
          if-no-files-found: error
