name: Security Scan — Iteration 6

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 9 * * 1"   # 每周一 09:00 UTC

jobs:
  # ── 1. 密钥泄漏检测 ──────────────────────────────────────
  secret-scan:
    name: Secret Leak Detection (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 2. Python 依赖漏洞扫描 ───────────────────────────────
  python-audit:
    name: Python Dependency Audit (pip-audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install pip-audit & safety
        run: pip install pip-audit safety
      - name: pip-audit
        run: pip-audit -r requirements.txt --format=markdown --output=pip-audit-report.md || true
      - name: safety check
        run: safety check -r requirements.txt --output text || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-report
          path: backend/pip-audit-report.md
          retention-days: 30

  # ── 3. NPM 依赖扫描 ──────────────────────────────────────
  npm-audit:
    name: NPM Dependency Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --prefer-offline 2>/dev/null || npm install
      - run: npm audit --audit-level=moderate || true

  # ── 4. SAST 静态代码分析（Bandit — Python）──────────────
  sast-python:
    name: SAST — Python (Bandit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install bandit
        run: pip install bandit[toml]
      - name: Run bandit
        run: |
          bandit -r app/ \
            -f json -o bandit-report.json \
            -ll -ii \
            --exclude app/tests \
            || true
      - name: Show summary
        run: |
          python3 -c "
          import json, sys
          try:
            d = json.load(open('bandit-report.json'))
            issues = d.get('results', [])
            high = [i for i in issues if i['issue_severity'] == 'HIGH']
            print(f'Total issues: {len(issues)}, HIGH: {len(high)}')
            for i in high:
              print(f'  {i[\"filename\"]}:{i[\"line_number\"]} — {i[\"issue_text\"]}')
          except: print('No report')
          " || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: backend/bandit-report.json
          retention-days: 30

  # ── 5. Docker 镜像漏洞扫描（Trivy）──────────────────────
  trivy-scan:
    name: Container Vulnerability Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t personal-landing-backend:scan ./backend
        continue-on-error: true
      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "personal-landing-backend:scan"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"
        continue-on-error: true
      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-results.sarif"
        continue-on-error: true

  # ── 6. OWASP ZAP 基线扫描（仅 main 分支）───────────────
  owasp-zap:
    name: OWASP ZAP Baseline Scan
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: "http://localhost:8000"
          allow_issue_writing: false
          fail_action: false
        continue-on-error: true

  # ── 7. 安全报告汇总 ──────────────────────────────────────
  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [secret-scan, python-audit, npm-audit, sast-python]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## 🔐 Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Secret Leak Detection | ${{ needs.secret-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Python Dependency Audit | ${{ needs.python-audit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| NPM Dependency Audit | ${{ needs.npm-audit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Python SAST (Bandit) | ${{ needs.sast-python.result }} |" >> $GITHUB_STEP_SUMMARY
