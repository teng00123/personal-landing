name: Security Scan

on:
  push:
    branches: [main, "feat/**", "fix/**"]
  pull_request:
    branches: [main]
  schedule:
    # 每周一 09:00 UTC 自动全量扫描
    - cron: "0 9 * * 1"

jobs:
  secret-scan:
    name: Secret Leak Detection (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}  # 公开仓库不需要

  python-audit:
    name: Python Dependency Audit (pip-audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit Python dependencies
        run: |
          pip-audit -r requirements.txt \
            --format=markdown \
            --output=pip-audit-report.md \
            --ignore-vuln GHSA-jfh8-c2jp-5    \
            || true   # 不强制失败，但会展示报告

      - name: Show audit report
        if: always()
        run: |
          if [ -f pip-audit-report.md ]; then
            cat pip-audit-report.md
          fi

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: backend/pip-audit-report.md
          retention-days: 30

  npm-audit:
    name: NPM Dependency Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci --prefer-offline 2>/dev/null || npm install

      - name: NPM audit (moderate+)
        run: npm audit --audit-level=moderate || true
        # 不强制失败；实际项目可改成 exit 1
