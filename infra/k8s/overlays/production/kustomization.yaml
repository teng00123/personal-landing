# infra/k8s/overlays/production/kustomization.yaml
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

bases:
  - ../../base

namespace: personal-landing

patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: backend
      spec:
        replicas: 3
        template:
          spec:
            containers:
              - name: backend
                resources:
                  requests:
                    cpu: "200m"
                    memory: "512Mi"
                  limits:
                    cpu: "2000m"
                    memory: "2Gi"

images:
  - name: ghcr.io/teng00123/personal-landing/backend
    newTag: "${IMAGE_TAG}"
  - name: ghcr.io/teng00123/personal-landing/frontend
    newTag: "${IMAGE_TAG}"
