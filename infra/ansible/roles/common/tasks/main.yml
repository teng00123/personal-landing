# infra/ansible/roles/common/tasks/main.yml
---
- name: 更新 apt 缓存
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: 安装基础软件包
  apt:
    name:
      - curl
      - wget
      - git
      - vim
      - htop
      - unzip
      - jq
      - fail2ban
      - ufw
      - python3-pip
      - ca-certificates
      - gnupg
    state: present

- name: 配置时区
  timezone:
    name: Asia/Shanghai

- name: 配置 UFW 防火墙
  ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop:
    - "22"
    - "80"
    - "443"

- name: 启用 UFW
  ufw:
    state: enabled
    policy: deny
    direction: incoming

- name: 配置 fail2ban
  copy:
    dest: /etc/fail2ban/jail.local
    content: |
      [sshd]
      enabled  = true
      maxretry = 5
      findtime = 300
      bantime  = 3600
  notify: restart fail2ban

- name: 启动 fail2ban
  service:
    name: fail2ban
    state: started
    enabled: yes

- name: 设置系统内核参数（性能优化）
  sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
    reload: yes
  loop:
    - { key: "net.core.somaxconn",          value: "65535" }
    - { key: "net.ipv4.tcp_max_syn_backlog", value: "65535" }
    - { key: "vm.swappiness",               value: "10" }
    - { key: "fs.file-max",                 value: "1000000" }

- name: 创建应用目录
  file:
    path: /opt/personal-landing
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: "0755"
