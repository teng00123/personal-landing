# nginx/prod.conf — 生产环境 Nginx 配置（SSL + 蓝绿切换）

upstream backend_blue  { server localhost:8001; }
upstream backend_green { server localhost:8002; }

# 当前活跃后端（蓝绿切换时由脚本修改此行）
upstream backend_active { server localhost:8001; }

# HTTP → HTTPS 跳转
server {
    listen 80;
    server_name _;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    server_name example.com;

    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # 安全头
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:;" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # 限流（与后端 Redis 限流双重保护）
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

    # API
    location /api/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass         http://backend_active;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # 登录限流更严
    location /api/v1/auth/login {
        limit_req zone=login burst=3 nodelay;
        proxy_pass http://backend_active;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # WebSocket
    location /api/v1/ws/ {
        proxy_pass          http://backend_active;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host $host;
        proxy_read_timeout  3600s;
    }

    # 上传文件
    location /uploads/ {
        proxy_pass         http://backend_active;
        client_max_body_size 50m;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # 前端静态资源
    location / {
        proxy_pass         http://frontend:80;
        proxy_set_header   Host $host;
        add_header Cache-Control "no-cache";
    }

    # 健康检查（不记录日志）
    location /health {
        proxy_pass         http://backend_active;
        access_log         off;
    }
}
