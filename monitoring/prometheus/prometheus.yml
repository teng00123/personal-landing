global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    project: 'personal-landing'
    env: 'production'

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - "rules/*.yml"

scrape_configs:

  # FastAPI 后端
  - job_name: 'fastapi'
    static_configs:
      - targets: ['backend:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # 宿主机系统指标
  - job_name: 'node'
    static_configs:
      - targets: ['node_exporter:9100']

  # Redis 指标
  - job_name: 'redis'
    static_configs:
      - targets: ['redis_exporter:9121']

  # Prometheus 自身
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']